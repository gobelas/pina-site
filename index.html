<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PINE</title>
<meta name="description" content="Pine mode: on." />
<link rel="icon" type="image/png" href="/favicon.png?v=2" />

<meta property="og:title" content="PINE" />
<meta property="og:description" content="Pine mode: on." />
<meta property="og:image" content="/favicon.png" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#0c0f08" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

<audio id="pineAudio" src="/pine-theme.mp3" loop preload="auto"></audio>
  
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

<style>
  :root{
    --bg: #0c0f08;
    --bg-soft: #14180d;
    --gold: #ffc233;
    --leaf: #7cb342;
    --coral: #ff6f61;
    --cream: #f5f0e1;
    --cream-dim: rgba(245,240,225,0.62);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    height:100%;
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* textura sutil tipo piel de piña, de fondo */
  body::before{
    content:"";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.05;
    background-image:
      repeating-linear-gradient(60deg, var(--gold) 0px, var(--gold) 1.5px, transparent 1.5px, transparent 34px),
      repeating-linear-gradient(-60deg, var(--gold) 0px, var(--gold) 1.5px, transparent 1.5px, transparent 34px);
  }

  main{
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 10vh 6vw 5vh;
    }

  .glow{
    position: absolute;
    top: 50%;
    left: 50%;
    width: min(70vw, 640px);
    height: min(70vw, 640px);
    transform: translate(-50%, -55%);
    background: radial-gradient(circle, rgba(255,194,51,0.20) 0%, rgba(255,111,97,0.10) 40%, transparent 72%);
    filter: blur(10px);
    z-index: 0;
    pointer-events: none;
  }

  .mascota{
    position: relative;
    width: clamp(120px, 22vw, 190px);
    height: auto;
    border-radius: 50%;
    margin-bottom: 2.1rem;
    animation: flotar 6s ease-in-out infinite;
    filter: drop-shadow(0 18px 34px rgba(0,0,0,0.55));
  }

  @keyframes flotar{
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-14px) rotate(2deg); }
  }

  .eyebrow{
    position: relative;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--leaf);
    margin: 0 0 1.1rem;
  }

  h1{
    position: relative;
    font-family: 'Bungee', sans-serif;
    font-weight: 400;
    font-size: clamp(3.4rem, 13vw, 8.5rem);
    line-height: 0.92;
    margin: 0;
    letter-spacing: 0.01em;
    background: linear-gradient(180deg, var(--gold) 0%, #ffb347 45%, var(--coral) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 2px 0 rgba(0,0,0,0.15);
  }

  .info-card{
    position: relative;
    width: min(90vw, 420px);
    margin: 1.8rem 0 0;
    padding: 0.4rem 1.3rem;
    border: 1px solid rgba(255,194,51,0.28);
    border-radius: 16px;
    background: rgba(245,240,225,0.03);
    backdrop-filter: blur(2px);
  }

  .info-row{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.85rem 0;
    border-bottom: 1px solid rgba(245,240,225,0.08);
  }

  .info-row:last-child{ border-bottom: none; }

  .info-label{
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream-dim);
    white-space: nowrap;
  }

  .info-value{
    font-family: 'DM Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.92rem;
    color: var(--cream);
    text-align: right;
    overflow-wrap: anywhere;
  }

  .info-value.address{
    font-size: 0.74rem;
    color: var(--gold);
    cursor: pointer;
    transition: color 0.15s ease;
  }

  .info-value.address:hover{
    color: var(--coral);
  }

  .copy-hint{
    display: block;
    margin-top: 0.9rem;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    color: var(--cream-dim);
  }

  .estado{
    position: relative;
    margin-top: 1.6rem;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.6rem 1.1rem;
    border: 1px solid rgba(124,179,66,0.4);
    border-radius: 999px;
    background: rgba(124,179,66,0.08);
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    color: var(--leaf);
  }

  .estado .punto{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--leaf);
    box-shadow: 0 0 0 0 rgba(124,179,66,0.6);
    animation: pulso 2s infinite;
  }

  @keyframes pulso{
    0% { box-shadow: 0 0 0 0 rgba(124,179,66,0.55); }
    70% { box-shadow: 0 0 0 9px rgba(124,179,66,0); }
    100% { box-shadow: 0 0 0 0 rgba(124,179,66,0); }
  }


  .estado:active{
      transform: scale(0.95);
    }
  
    .estado.off{
      border-color: rgba(255,77,77,0.45);
      background: rgba(255,77,77,0.08);
      color: #ff6b6b;
    }
  
    .estado.off .punto{
      background: #ff4d4d;
      animation: none;
      box-shadow: none;
    }
  
  footer{
    position: relative;
    z-index: 1;
    padding: 0.8rem;
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    color: rgba(245,240,225,0.35);
  }

  @media (prefers-reduced-motion: reduce){
    .mascota{ animation: none; }
    .estado .punto{ animation: none; }
  }
</style>
</head>
<body>
  <main>
    <div class="glow"></div>
    <img class="mascota" src="/favicon.png" alt="Just a pineapple with sunglasses. What else?" />
    <p class="eyebrow">Certified tropical flavor</p>
    <h1>PINE</h1>
    <div class="info-card">
      <div class="info-row"><span class="info-label">Chain</span><span class="info-value">Base</span></div>
      <div class="info-row"><span class="info-label">Quote</span><span class="info-value">ETH</span></div>
      <div class="info-row"><span class="info-label">CA</span><span class="info-value address" id="ca" onclick="copiarCA()">0xb20000000000000000000063cb5e45a7bcb7c701</span></div>
      <div class="info-row"><span class="info-label">Total supply</span><span class="info-value">1B</span></div>
    </div>
    <span class="copy-hint" id="copyHint"></span>
    <div class="estado off" id="estado" onclick="toggleModo()"><span class="punto"></span> <span id="estadoTexto">Pine mode: off</span></div>
  </main>
  <footer>made with pineapple juice</footer>

<script>
    const audio = document.getElementById('pineAudio');
  let fadeInterval;

  function fadeAudio(target, duration = 500){
    clearInterval(fadeInterval);
    const steps = 20;
    const stepTime = duration / steps;
    const startVol = audio.volume;
    const diff = target - startVol;
    let i = 0;
    fadeInterval = setInterval(() => {
      i++;
      audio.volume = Math.max(0, Math.min(1, startVol + diff * (i / steps)));
      if(i >= steps){
        clearInterval(fadeInterval);
        if(target === 0) audio.pause();
      }
    }, stepTime);
  }

  function toggleModo(){
    const estado = document.getElementById('estado');
    const texto = document.getElementById('estadoTexto');
    const isOff = estado.classList.toggle('off');
    texto.textContent = isOff ? 'Pine mode: off' : 'Pine mode: on';

    if(isOff){
      fadeAudio(0);
    } else {
      audio.volume = 0;
      audio.play();
      fadeAudio(0.6);
    }
  }
  
  function copiarCA(){
    const ca = document.getElementById('ca').textContent;
    const hint = document.getElementById('copyHint');
    navigator.clipboard.writeText(ca).then(() => {
      hint.textContent = 'copied!';
      setTimeout(() => { hint.textContent = ''; }, 1500);
    });
  } 
</script>
</body>
</html>
